services:
  - type: web
    name: smartswap
    runtime: docker
    plan: free
    repo: https://github.com/amol16112005/smartswap
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false